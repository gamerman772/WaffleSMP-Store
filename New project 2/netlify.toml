[build]
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api?path=:splat"
  status = 200
  force = true

[dev]
  command = "node dev-server.mjs"
  port = 8888
  targetPort = 3000
  framework = "#custom"
